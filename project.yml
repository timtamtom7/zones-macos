name: Zones
options:
  bundleIdPrefix: com.timtamtom
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: ZONES
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  Zones:
    type: application
    platform: macOS
    sources:
      - path: ZONES
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: ZONES/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZONES/ZONES.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.timtamtom.zones
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: ZONES/ZONES.entitlements
