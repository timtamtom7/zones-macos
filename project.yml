name: ZONES
options:
  bundleIdPrefix: com.zones
  deployment:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.14.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ZONES:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "ZONESWidgets/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zones.app
        PRODUCT_NAME: ZONES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: SQLite
    entitlements:
      path: Sources/Resources/ZONES.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.keychain-access-groups:
          - $(AppIdentifierPrefix)com.zones.app
        com.apple.security.application-groups:
          - group.com.zones.app
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.zones.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.personal-information.location: true
